<div class="dashboard-container">
    <app-sidebar></app-sidebar>
    <div class="main-content">
      <div class="top-bar">
        <h1>Workflowify</h1>
        <div class="user-info" *ngIf="username">

  <button mat-button [matMenuTriggerFor]="menu" class="user-btn">
    <mat-icon>account_circle</mat-icon>
    {{ username }}
    <mat-icon>arrow_drop_down</mat-icon>
  </button>

  <mat-menu #menu="matMenu">

    <button mat-menu-item (click)="goToSettings()">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>

    <button mat-menu-item (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>

  </mat-menu>

</div>
      </div>
  
      <div class="stats-cards">
        <mat-card class="stat-card">
          <h3>Total Workflows</h3>
          <p>{{ totalWorkflows }}</p>
        </mat-card>
        <mat-card class="stat-card">
          <h3>Active</h3>
          <p>{{ activeWorkflows }}</p>
        </mat-card>
        <mat-card class="stat-card">
          <h3>Inactive</h3>
          <p>{{ inactiveWorkflows }}</p>
        </mat-card>
      </div>
  
      <div class="workflows-table">
        <div class="table-header">
          <h2>Your Workflows</h2>
          <button mat-raised-button color="primary" (click)="openCreateDialog()">+ Create Workflow</button>
        </div>
  
        <mat-table [dataSource]="workflows" class="mat-elevation-z8">
          <ng-container matColumnDef="name">
            <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
            <mat-cell *matCellDef="let workflow">{{ workflow.name }}</mat-cell>
          </ng-container>
  
          <ng-container matColumnDef="status">
            <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
            <mat-cell *matCellDef="let workflow">{{ workflow.active ? 'Active' : 'Inactive' }}</mat-cell>
          </ng-container>
  
          <ng-container matColumnDef="action">
            <mat-header-cell *matHeaderCellDef>Action</mat-header-cell>
            <mat-cell *matCellDef="let workflow">
              <button mat-button color="accent" (click)="goToBuilder(workflow.id)">Open</button>
            </mat-cell>
          </ng-container>
  
          <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
          <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
        </mat-table>
      </div>
    </div>
  </div>
